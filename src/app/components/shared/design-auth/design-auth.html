<!--Design-->
<div class="relative overflow-hidden brand flex-1 h-full px-17 pt-20">
  <!-- Círculo de fumaça azul -->
  <div class="absolute top-0 left-1/2 -translate-x-2/6 -translate-y-1/3 w-350 h-200 rounded-full" style="background: radial-gradient(circle, #2564eb3b 0%, #2564eb1c 40%, transparent 70%);
        filter: blur(60px);
        z-index: 0;">
  </div>

  <img class="w-50" src="brand/Logo.png" alt="Logo">

  <h1 class="flex flex-col font-medium text-8xl text-white mt-36">
    Faça menos.<br>
    Termine
    <span class="text-[#60A5FA] mt-4 transition-all duration-700" [class.opacity-0]="animated()"
      [class.-translate-y-4]="animated()">
      {{ words[currentIndex()] }}
    </span>
  </h1>

  <p class="mt-15 text-[#A1A1AA] text-[15pt] leading-10">
    Uma plataforma calma para mentes ocupadas. <br>
    Organize o que importa, ignore o resto.
  </p>

  <div class="flex justify-between text-[#535357] mt-46">
    <p>© 2026 FocusList</p>
    <p>ORGANIZE SUA VIDA</p>
  </div>
</div>
