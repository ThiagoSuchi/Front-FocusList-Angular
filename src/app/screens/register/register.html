<div class="flex w-full h-screen">
  <app-design-auth class="flex-1 h-full"></app-design-auth>

  <!--Cadastrar-->
  <div class="flex flex-col justify-center items-center bg-[#f3f3f3] w-210 h-full shrink-0">
    <div class="flex flex-col gap-3 mb-14 w-full px-50">
      <h1 class="text-4xl font-semibold">Criar conta</h1>
      <p class="text-zinc-500 text-[12pt]">Comece em menos de um minuto.</p>
    </div>

    <form 
      [formGroup]="form" (ngSubmit)="submit()"
      class="flex flex-col mb-15 w-full px-50">
      <div class="flex flex-col gap-2">
        <label class="text-[12pt] font-medium" for="nome">Nome</label>
        <input 
          formControlName="name"
          [class.border-red-700]="form.get('name')?.invalid && form.get('name')?.touched"
          [class.border-transparent]="!form.get('name')?.invalid && form.get('name')?.errors"
          class="bg-[#E4E4E7] text-[12pt] text-[#878a91] h-15 rounded-[9px] px-5 outline-0 border border-[#ffffff00]" type="nome" id="nome"
          placeholder="Diga seu nome"
        >
        <app-error-validations
          [control]="form.get('name')"
          [errors]="[
            { key: 'required', message: 'Nome é obrigatório' },
            { key: 'minlength', message: 'Nome deve ter no mínimo 3 caracteres' },
          ]"
        ></app-error-validations>
      </div>

      <div class="flex flex-col gap-2 mt-6">
        <label class="text-[12pt] font-medium" for="email">E-mail</label>
        <input 
          formControlName="email"
          [class.border-red-700]="form.get('email')?.invalid && form.get('email')?.touched"
          [class.border-transparent]="!form.get('email')?.invalid && form.get('email')?.errors"
          class="bg-[#E4E4E7] text-[12pt] text-[#878a91] h-15 rounded-[9px] px-5 outline-0 border border-[#ffffff00]" type="email" id="email"
          placeholder="Example@gmail.com"
        >
        <app-error-validations 
          [control]="form.get('email')"
          [errors]="[
            { key: 'required', message: 'Email é obrigatório' },
            { key: 'email', message: 'Email inserido é inválido' },
          ]"
        ></app-error-validations>
      </div>

      <div class="relative flex flex-col gap-2 mt-6">
        <label class="text-[12pt] font-medium" for="senha">Senha</label>
        <input
          (input)="verificarForca($event)"
          formControlName="password"
          [class.border-red-700]="form.get('password')?.invalid && form.get('password')?.touched"
          [class.border-transparent]="!form.get('password')?.invalid && form.get('password')?.errors"
          class="bg-[#E4E4E7] text-[12pt] text-[#878a91] h-15 rounded-[9px] px-5 border outline-0 border-[#ffffff00]"
          [type]="viewPassword() ? 'text' : 'password'" id="senha" placeholder="Sua senha"
        >
        <span class="material-symbols-outlined text-[#A1A1AA] cursor-pointer absolute right-4 top-12" (click)="togglePassword()">
          {{ viewPassword() ? 'visibility' : 'visibility_off' }}
        </span>
        <app-error-validations
          [control]="form.get('password')"
          [errors]="[
            { key: 'required', message: 'Senha é obrigatório' },
            { key: 'minlength', message: 'Senha deve ter no mínimo 8 caracteres. ' },
            { key: 'pattern', message: 'Senha deve conter maiúscula, minúscula, número e símbolo' }
          ]"
        ></app-error-validations>
      </div>

      <!--Barras indicadoras de senha fraca/forte-->
      <div class="flex items-center gap-2 w-full mt-2">
        <div class="bg-[#E4E4E7] w-100 h-1 rounded-full transition-all duration-400"
          [class.bg-red-400]="forca() >= 1"
        ></div>
        <div class="bg-[#E4E4E7] w-100 h-1 rounded-full transition-all duration-400"
          [class.bg-orange-300]="forca() >= 2"
        ></div>
        <div class="bg-[#E4E4E7] w-100 h-1 rounded-full transition-all duration-400"
          [class.bg-green-500]="forca() >= 3"
        ></div>
        <div class="bg-[#E4E4E7] w-100 h-1 rounded-full transition-all duration-400"
          [class.bg-green-600]="forca() >= 4"
        ></div>
      </div>

    </form>
  </div>
</div>
