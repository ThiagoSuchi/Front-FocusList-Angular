<div class="flex w-full h-screen">
  <app-design-auth class="flex-1 h-full"></app-design-auth>

  <!--Cadastrar-->
  <div class="flex flex-col justify-center items-center bg-[#f3f3f3] w-210 h-full shrink-0">
    <div class="flex flex-col gap-3 mb-14 w-full px-50">
      <h1 class="text-4xl font-semibold">Criar conta</h1>
      <p class="text-zinc-500 text-[12pt]">Comece em menos de um minuto.</p>
    </div>

    <form 
      [formGroup]="form" (ngSubmit)="submit()"
      class="flex flex-col mb-15 w-full px-50">
      <div class="flex flex-col gap-2">
        <label class="text-[12pt] font-medium" for="nome">Nome</label>
        <input 
          formControlName="name"
          [class.border-red-700]="form.get('name')?.invalid && form.get('name')?.touched"
          [class.border-transparent]="!form.get('name')?.invalid && form.get('name')?.errors"
          class="bg-[#E4E4E7] text-[12pt] text-[#878a91] h-15 rounded-[9px] px-5 outline-0 border border-[#ffffff00]" type="nome" id="nome"
          placeholder="Diga seu nome"
        >
        <app-error-validations
          [control]="form.get('name')"
          [errors]="[
            { key: 'required', message: 'Nome é obrigatório' },
            { key: 'minlength', message: 'Nome deve ter no mínimo 3 caracteres' },
          ]"
        ></app-error-validations>
      </div>

    </form>
  </div>
</div>
