<div class="flex w-full h-screen">
  <app-design-auth class="flex-1 h-full"></app-design-auth>
  
  <!--Login-->
  <div class="flex flex-col justify-center items-center bg-[#f3f3f3] w-210 h-full shrink-0">
    <div class="flex flex-col gap-3 mb-14 w-full px-50">
      <h1 class="text-4xl font-semibold">Bem vindo de
        <span class="text-white bg-zinc-700 px-1 -skew-x-24 inline-block">volta</span>
      </h1>
      <p class="text-zinc-500 text-[12pt]">Acesse sua conta para continuar.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" 
      class="flex flex-col gap-6 mb-15 w-full px-50">
      <div class="flex flex-col gap-2">
        <label class="text-[12pt] font-medium" for="email">E-mail</label>
        <input 
          formControlName="email"
          [class.border-red-700]="form.get('email')?.invalid && form.get('email')?.touched"
          class="bg-[#E4E4E7] text-[12pt] outline-0 text-[#878a91] h-14 rounded-[9px] px-5 border border-[#ffffff00]" type="email" id="email"
          placeholder="example@gmail.com"
        >
        <app-error-validations
          [control]="form.get('email')"
          [errors]="[
            { key: 'required', message: 'Email é obrigatório' },
            { key: 'email', message: 'Email inserido é inválido' },
          ]"
        ></app-error-validations>
      </div>

      <div class="relative flex flex-col gap-2">
        <label class="text-[12pt] font-medium" for="senha">Senha</label>
        <input
          formControlName="password"
          [class.border-red-700]="form.get('password')?.invalid && form.get('password')?.touched"
          class="bg-[#E4E4E7] text-[12pt] text-[#878a91] h-14 rounded-[9px] px-5 outline-0 border border-[#ffffff00]"
          [type]="viewPassword() ? 'text' : 'password'" id="senha" placeholder="Sua senha">
        <span class="material-symbols-outlined text-[#A1A1AA] cursor-pointer absolute right-4 top-11" (click)="togglePassword()">
          {{ viewPassword() ? 'visibility' : 'visibility_off' }}
        </span>
        
        
      </div>

      <div class="flex justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" class="peer sr-only" />
          <div class="relative w-5 h-5 shrink-0 border-2 border-slate-900 rounded-md
                      peer-checked:bg-blue-600 peer-checked:border-blue-600
                      transition-all [&>svg]:opacity-0 peer-checked:[&>svg]:opacity-100">
            <svg class="absolute inset-0 m-auto w-4 h-4 text-white pointer-events-none transition-opacity"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
          <span class="text-[12pt] text-zinc-700">Lembrar-me</span>
        </label>
        <span class="hover:text-zinc-400 transition-all cursor-pointer text-[14pt] text-zinc-500">Esqueci a senha</span>
      </div>

      <button class="bg-black rounded-[9px] cursor-pointer h-14 text-[14pt] text-white" type="submit">
        Entrar
      </button>
    </form>

    <p class="text-[14pt] text-zinc-500">Não tenho uma conta?
      <span [routerLink]="'/register'" class="cursor-pointer transition-all hover:text-zinc-600 text-black font-semibold">Criar conta</span>
    </p>
  </div>
</div>
